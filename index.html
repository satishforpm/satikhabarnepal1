const ADMIN_USER = "admin";

(function loadExtraNews(){
  try{
    const extra = JSON.parse(localStorage.getItem("sk_extra_news") || "[]");
    if(Array.isArray(extra) && extra.length) NEWS.unshift(...extra);
  }catch(e){}

  try{
    const overrides = JSON.parse(localStorage.getItem("sk_overrides") || "{}");
    NEWS.forEach(a=>{ if(overrides[a.id]) Object.assign(a, overrides[a.id]); });
  }catch(e){}

  try{
    const deleted = JSON.parse(localStorage.getItem("sk_deleted") || "[]");
    if(deleted.length){
      const kept = NEWS.filter(a=>!deleted.includes(a.id));
      NEWS.length = 0;
      NEWS.push(...kept);
    }
  }catch(e){}
})();

function saveExtraNews(article){
  try{
    const extra = JSON.parse(localStorage.getItem("sk_extra_news") || "[]");
    extra.unshift(article);
    localStorage.setItem("sk_extra_news", JSON.stringify(extra));
  }catch(e){}
}

function saveOverride(id, fields){
  try{
    const overrides = JSON.parse(localStorage.getItem("sk_overrides") || "{}");
    overrides[id] = fields;
    localStorage.setItem("sk_overrides", JSON.stringify(overrides));
  }catch(e){}

  // if this id belongs to a locally-added article, update it in sk_extra_news too
  try{
    const extra = JSON.parse(localStorage.getItem("sk_extra_news") || "[]");
    const idx = extra.findIndex(a=>a.id===id);
    if(idx>-1){ Object.assign(extra[idx], fields); localStorage.setItem("sk_extra_news", JSON.stringify(extra)); }
  }catch(e){}
}

function saveDeleted(id){
  try{
    const deleted = JSON.parse(localStorage.getItem("sk_deleted") || "[]");
    if(!deleted.includes(id)) deleted.push(id);
    localStorage.setItem("sk_deleted", JSON.stringify(deleted));
  }catch(e){}
  try{
    const extra = JSON.parse(localStorage.getItem("sk_extra_news") || "[]");
    localStorage.setItem("sk_extra_news", JSON.stringify(extra.filter(a=>a.id!==id)));
  }catch(e){}
}

      <div class="modal-box wide">
        <button class="modal-close" onclick="closeModal()">×</button>

        <label for="fReporter">रिपोर्टर</label>
        <input id="fReporter" type="text" value="${isEdit ? escapeAttr(article.reporter) : ""}">
        <label for="fImage">फोटो URL</label>
        <input id="fImage" type="text" placeholder="https://..." value="${isEdit ? escapeAttr(article.featuredImage) : ""}">
        <div id="addErr" class="modal-error"></div>
        <div class="modal-actions">
          <button class="btn-primary" onclick="submitArticleForm(${isEdit ? article.id : "null"})">${isEdit ? "अपडेट गर्नुहोस्" : "प्रकाशित गर्नुहोस्"}</button>
          <button class="btn-ghost" onclick="closeModal()">रद्द गर्नुहोस्</button>
        </div>
      </div>
    </div>`;

function escapeHTML(s){ return (s||"").replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escapeAttr(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function submitArticleForm(editId){
  const title = document.getElementById("fTitle").value.trim();
  const category = document.getElementById("fCategory").value;
  const summary = document.getElementById("fSummary").value.trim();
  const bodyRaw = document.getElementById("fBody").value.trim();
  const reporter = document.getElementById("fReporter").value.trim() || "SatiKhabar";
  const image = document.getElementById("fImage").value.trim() || "https://images.unsplash.com/photo-1495020689067-958852a7765e?q=80&w=1200&auto=format&fit=crop";

  if(!title || !summary || !bodyRaw){
    document.getElementById("addErr").textContent = "शीर्षक, संक्षिप्त विवरण र पूरा समाचार आवश्यक छ।";
    return;
  }

  const bodyArr = bodyRaw.split("\n").map(s=>s.trim()).filter(Boolean);

  if(editId){
    const existing = NEWS.find(a=>a.id===editId);
    const fields = { title, category, summary, body:bodyArr, reporter, featuredImage:image };
    if(existing) Object.assign(existing, fields);
    saveOverride(editId, fields);
  } else {
    const newId = Date.now();
    const article = {
      id:newId, category, title, summary, body:bodyArr, reporter,
      publishDate: new Date().toISOString().slice(0,10),
      featuredImage: image
    };
    NEWS.unshift(article);
    saveExtraNews(article);
  }

  closeModal();
  renderHome();
  window.scrollTo({top:0,behavior:"smooth"});
}

function editFromManage(id){
  const article = NEWS.find(a=>a.id===id);
  if(article) openArticleForm(article);
}

function deleteArticle(id){
  if(!confirm("यो समाचार मेट्ने निश्चित हुनुहुन्छ?")) return;
  const idx = NEWS.findIndex(a=>a.id===id);
  if(idx>-1) NEWS.splice(idx,1);
  saveDeleted(id);
  openManageModal();
  renderHome();
}

function updateSEO(article){
  if(!article) return;
  const siteName = "SatiKhabar";
  const baseURL = "https://satikhabar.netlify.app/";
  const title = article.seoTitle || article.title;
  const description = article.seoDesc || article.summary || article.subtitle || "";
  const image = article.ogImage || article.featuredImage || baseURL + "og-image.jpg";
  const url = baseURL + "?article=" + article.id;

  document.title = title + " | " + siteName;
  setMeta("description",description);
  setMetaProperty("og:type","article");
  setMetaProperty("og:title",title);
  setMetaProperty("og:description",description);
  setMetaProperty("og:image",image);
  setMetaProperty("og:url",url);
  setMetaProperty("og:site_name",siteName);
  setMetaName("twitter:card","summary_large_image");
  setMetaName("twitter:title",title);
  setMetaName("twitter:description",description);
  setMetaName("twitter:image",image);
  document.querySelector("link[rel='canonical']").href = url;
  generateSchema(article,url,image,title,description);
}

  const baseURL = "https://satikhabar.netlify.app/";
  document.title = "SatiKhabar | नेपालको भरपर्दो समाचार पोर्टल";
  setMeta("description","SatiKhabar — राजनीति, अर्थतन्त्र, खेलकुद, स्थानीय र अन्तर्राष्ट्रिय समाचार एकै ठाउँमा।");
  setMetaProperty("og:type","website");
  setMetaProperty("og:title",document.title);
  setMetaProperty("og:url",baseURL);
  document.querySelector("link[rel='canonical']").href = baseURL;
}

function setMeta(name,value){
  let tag=document.querySelector(`meta[name="${name}"]`);
  if(!tag){tag=document.createElement("meta");tag.setAttribute("name",name);document.head.appendChild(tag);}
  tag.content=value;
}
function setMetaName(name,value){ setMeta(name,value); }
function setMetaProperty(property,value){
  let tag=document.querySelector(`meta[property="${property}"]`);
  if(!tag){tag=document.createElement("meta");tag.setAttribute("property",property);document.head.appendChild(tag);}
  tag.content=value;
}
function generateSchema(article,url,image,title,description){
  const schema={
    "@context":"https://schema.org","@type":"NewsArticle",
    "headline":title,"description":description,"image":[image],
    "datePublished":article.publishDate,"dateModified":article.updatedDate || article.publishDate,
    "author":{"@type":"Person","name":article.reporter},
    "publisher":{"@type":"Organization","name":"SatiKhabar","logo":{"@type":"ImageObject","url":"https://satikhabar.netlify.app/logo.png"}},
    "mainEntityOfPage":{"@type":"WebPage","@id":url}
  };
  document.getElementById("jsonld-schema").textContent = JSON.stringify(schema);
}

function garlandHTML(){
  let s='<div class="garland" aria-hidden="true">';
  for(let i=0;i<11;i++) s+='<span></span>';
  return s+'</div>';
}

function cardHTML(article, variant){
  const tagClass = article.category==="अन्तर्राष्ट्रिय" ? "blue" : (article.category==="खेलकुद" ? "gold" : "");
  if(variant==="feature"){
    return `<article class="story-feature" onclick="openArticle(${article.id})">
      <div class="thumb"><img src="${article.featuredImage}" alt="${article.title}" loading="lazy" decoding="async"></div>
      <span class="tag-pill ${tagClass}">${article.category}</span>
      <h2>${article.title}</h2>
      <p class="summary">${article.summary}</p>
      <div class="meta-row"><span>${article.reporter}</span><span>${formatDate(article.publishDate)}</span></div>
    </article>`;
  }
  if(variant==="side"){
    return `<article class="side-item" onclick="openArticle(${article.id})">
      <div class="thumb"><img src="${article.featuredImage}" alt="${article.title}" loading="lazy" decoding="async"></div>
      <div>
        <span class="tag-pill ${tagClass}">${article.category}</span>
        <h3>${article.title}</h3>
        <div class="meta-row"><span>${formatDate(article.publishDate)}</span></div>
      </div>
    </article>`;
  }
  return `<article class="card" onclick="openArticle(${article.id})">
    <div class="thumb"><img src="${article.featuredImage}" alt="${article.title}" loading="lazy" decoding="async"></div>
    <span class="tag-pill ${tagClass}">${article.category}</span>
    <h3>${article.title}</h3>
    <p class="summary">${article.summary}</p>
    <div class="meta-row"><span>${article.reporter}</span><span>${formatDate(article.publishDate)}</span></div>
  </article>`;
}

function formatDate(d){
  const date=new Date(d);
  return date.toLocaleDateString("ne-NP",{year:"numeric",month:"short",day:"numeric"});
}

function renderNav(){
  const nav=document.getElementById("navInner");
  nav.innerHTML = CATEGORIES.map(c=>
    `<button class="nav-btn ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

function setCategory(cat){
  activeCategory=cat;
  renderNav();
  renderHome();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderHome(){
  history.replaceState({},"","./");
  resetHomeSEO();
  renderNav();

  const list = activeCategory==="सबै" ? NEWS : NEWS.filter(n=>n.category===activeCategory);
  const sorted = [...list].sort((a,b)=> new Date(b.publishDate)-new Date(a.publishDate));
  const feature = sorted[0];
  const sideItems = sorted.slice(1,4);
  const rest = sorted.slice(4);

  let html = "";

  if(feature){
    html += `<section class="hero">
      ${cardHTML(feature,"feature")}
      <div class="side-list">${sideItems.map(a=>cardHTML(a,"side")).join("")}</div>
    </section>`;
  } else {
    html += `<p style="color:var(--slate);padding:40px 0;text-align:center;">यस विभागमा हाल कुनै समाचार छैन।</p>`;
  }

  if(rest.length){
    html += `${garlandHTML()}
    <section class="section">
      <div class="section-head"><h2>थप समाचार</h2><div class="rule"></div></div>
      <div class="grid">${rest.map(a=>cardHTML(a,"card")).join("")}</div>
    </section>`;
  }

  document.getElementById("mainContent").innerHTML = html;
}

function openArticle(id){
  const article = NEWS.find(x=>x.id==id);
  if(!article) return;
  updateSEO(article);
  history.pushState({},"", "?article="+article.id);

  const tagClass = article.category==="अन्तर्राष्ट्रिय" ? "blue" : (article.category==="खेलकुद" ? "gold" : "");
  const related = NEWS.filter(n=>n.category===article.category && n.id!==article.id).slice(0,3);

  document.getElementById("mainContent").innerHTML = `
    <div class="article-view">
      <button class="back-btn" onclick="goHome()">← गृहपृष्ठमा फर्कनुहोस्</button>
      <span class="tag-pill ${tagClass}">${article.category}</span>
      <h1>${article.title}</h1>
      <div class="meta-row"><span>${article.reporter}</span><span>${formatDate(article.publishDate)}</span></div>
      <div class="article-thumb" style="margin-top:16px;"><img src="${article.featuredImage}" alt="${article.title}"></div>
      <div class="body-text">${article.body.map(p=>`<p>${p}</p>`).join("")}</div>
      <div class="article-toolbar">
        <span class="meta-row">रिपोर्टर: ${article.reporter}</span>
        <button class="share-btn" onclick='shareArticle(${JSON.stringify(article).replace(/'/g,"&apos;")})'>सेयर गर्नुहोस्</button>
      </div>
    </div>
    ${related.length ? `${garlandHTML()}<section class="section"><div class="section-head"><h2>सम्बन्धित समाचार</h2><div class="rule"></div></div><div class="grid">${related.map(a=>cardHTML(a,"card")).join("")}</div></section>` : ""}
  `;
  window.scrollTo({top:0,behavior:"smooth"});
}

function goHome(){
  history.pushState({},"","./");
  renderHome();
  window.scrollTo({top:0,behavior:"smooth"});
}

function shareArticle(article){
  const url = "https://satikhabar.netlify.app/?article="+article.id;
  if(navigator.share){
    navigator.share({title:article.title,text:article.summary,url:url});
  } else {
    navigator.clipboard.writeText(url);
    alert("लिंक कपी भयो: "+url);
  }
}

document.getElementById("year").textContent = new Date().getFullYear();
document.getElementById("todayDate").textContent = new Date().toLocaleDateString("ne-NP",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

window.addEventListener("load",()=>{
  renderAdminBar();
  const params = new URLSearchParams(location.search);
  const id = params.get("article");
  if(id){ openArticle(id); } else { renderHome(); }
});

window.addEventListener("popstate",()=>{
  const params = new URLSearchParams(location.search);
  const id = params.get("article");
  if(id){ openArticle(id); } else { renderHome(); }
});
</script>
</body>
</html>
